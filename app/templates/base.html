<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Health Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:            #060a14;
      --bg-card:       rgba(13, 19, 35, 0.72);
      --border:        rgba(99, 102, 241, 0.13);
      --border-hover:  rgba(99, 102, 241, 0.38);
      --accent:        #6366f1;
      --accent2:       #8b5cf6;
      --text:          #e2e8f0;
      --text-muted:    #64748b;
      --grid:          rgba(99, 102, 241, 0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 8%  -5%, rgba(99,102,241,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 70% 45% at 92% 105%, rgba(139,92,246,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 50%  50%, rgba(6,182,212,0.04) 0%, transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(6, 10, 20, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.06), 0 8px 32px rgba(0,0,0,0.35);
    }

    /* ── Stat cards ── */
    .stat-card { position: relative; overflow: hidden; }
    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: radial-gradient(ellipse at 0% 0%, rgba(255,255,255,0.04) 0%, transparent 65%);
      pointer-events: none;
    }
    .stat-value {
      font-size: 2.1rem;
      font-weight: 750;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .stat-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 500;
      margin-top: 0.45rem;
    }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .tag-green  { background: rgba(74,222,128,0.10); color: #4ade80; border: 1px solid rgba(74,222,128,0.22); }
    .tag-yellow { background: rgba(251,191,36,0.10); color: #fbbf24; border: 1px solid rgba(251,191,36,0.22); }
    .tag-red    { background: rgba(248,113,113,0.10); color: #f87171; border: 1px solid rgba(248,113,113,0.22); }

    /* ── Nav ── */
    nav a {
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.875rem;
      transition: color 0.15s;
      position: relative;
      padding-bottom: 2px;
    }
    nav a:hover { color: #cbd5e1; }
    nav a.active { color: #fff; }
    nav a.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 2px;
      border-radius: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* ── Sync button ── */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 2px 12px rgba(99,102,241,0.35);
    }
    .btn-primary:hover { opacity: 0.88; transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.45; transform: none; cursor: default; box-shadow: none; }

    /* ── Toggle buttons ── */
    .toggle-btn {
      border-radius: 5px;
      font-weight: 500;
      font-size: 0.72rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.28); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }
    .delay-1   { animation-delay: 0.06s; }
    .delay-2   { animation-delay: 0.12s; }
    .delay-3   { animation-delay: 0.18s; }
    .delay-4   { animation-delay: 0.24s; }
  </style>
</head>
<body>
  <header class="px-6 py-3.5 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;filter:drop-shadow(0 2px 10px rgba(99,102,241,0.45))">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <rect width="36" height="36" rx="10" fill="url(#lg)"/>
          <!-- T mark: crossbar + stem, no overlap -->
          <rect x="7" y="8" width="22" height="5" rx="2" fill="white"/>
          <rect x="15" y="13" width="6" height="15" rx="2" fill="white"/>
        </svg>
        <div style="line-height:1">
          <div style="font-size:1.05rem;font-weight:800;letter-spacing:0.1em;background:linear-gradient(120deg,#a5b4fc 0%,#c084fc 50%,#e879f9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">TANAR</div>
          <div style="font-size:0.58rem;color:#475569;letter-spacing:0.2em;font-weight:600;margin-top:3px">HEALTH</div>
        </div>
      </a>
      <nav class="flex gap-6">
        <a href="/" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/report" class="{% block nav_report %}{% endblock %}">Monthly Report</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <button id="syncBtn" onclick="triggerSync()" class="btn-primary">Sync Now</button>
      <a href="/auth/whoop" class="text-xs font-medium transition" style="color:var(--text-muted)" onmouseover="this.style.color='#cbd5e1'" onmouseout="this.style.color='var(--text-muted)'">Connect Whoop</a>
      <a href="/auth/strava" class="text-xs font-medium transition" style="color:var(--text-muted)" onmouseover="this.style.color='#cbd5e1'" onmouseout="this.style.color='var(--text-muted)'">Connect Strava</a>
    </div>
  </header>

  <main class="px-6 py-8 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  <script>
    async function triggerSync() {
      const btn = document.getElementById('syncBtn');
      btn.textContent = 'Syncing…';
      btn.disabled = true;
      await fetch('/sync/all', { method: 'POST' });
      setTimeout(() => { btn.textContent = 'Sync Now'; btn.disabled = false; location.reload(); }, 8000);
    }

    const SPORT_ALIASES = { 'workout': 'Jiu Jitsu' };
    function displaySport(s) {
      if (!s) return 'other';
      const aliased = SPORT_ALIASES[s.toLowerCase()];
      if (aliased) return aliased;
      return s.replace(/([a-z])([A-Z])/g, '$1 $2');
    }

    const SPORT_COLORS = {
      'Run':             '#f97316',
      'Ride':            '#38bdf8',
      'Virtual Ride':    '#60a5fa',
      'Swim':            '#2dd4bf',
      'Hike':            '#4ade80',
      'Walk':            '#86efac',
      'Jiu Jitsu':       '#c084fc',
      'Weight Training': '#fb923c',
      'Yoga':            '#f472b6',
      'Nordic Ski':      '#e2e8f0',
      'Rowing':          '#facc15',
      'other':           '#94a3b8',
    };
    const FALLBACK_COLORS = ['#f97316','#38bdf8','#c084fc','#2dd4bf','#facc15','#fb923c','#f472b6'];
    function sportColor(name, idx) { return SPORT_COLORS[name] || FALLBACK_COLORS[idx % FALLBACK_COLORS.length]; }

    const PLOTLY_LAYOUT = {
      paper_bgcolor: 'transparent',
      plot_bgcolor:  'transparent',
      font: { color: '#64748b', size: 11, family: 'Inter, system-ui, sans-serif' },
      xaxis: { gridcolor: 'rgba(99,102,241,0.08)', linecolor: 'rgba(99,102,241,0.12)', tickcolor: 'transparent' },
      yaxis: { gridcolor: 'rgba(99,102,241,0.08)', linecolor: 'rgba(99,102,241,0.12)', tickcolor: 'transparent' },
      margin: { t: 30, r: 10, b: 40, l: 48 },
      legend: { bgcolor: 'transparent', font: { color: '#94a3b8', size: 11 } },
      hoverlabel: { bgcolor: '#0d1323', bordercolor: 'rgba(99,102,241,0.35)', font: { color: '#e2e8f0', size: 12 } },
    };
    const PLOTLY_CONFIG = { responsive: true, displayModeBar: false };
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
