<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Health Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    :root {
      --bg:           #020810;
      --bg-card:      rgba(3, 9, 20, 0.92);
      --cyan:         #06b6d4;
      --cyan-hi:      #22d3ee;
      --cyan-lo:      rgba(6,182,212,0.12);
      --amber:        #f59e0b;
      --neon-green:   #00e5a0;
      --electric-red: #f43f5e;
      --border:       rgba(6,182,212,0.13);
      --border-active:rgba(6,182,212,0.45);
      --text:         #d0daea;
      --text-muted:   #4a6a85;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(6,182,212,0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.032) 1px, transparent 1px),
        radial-gradient(ellipse 85% 50% at 10% -5%, rgba(6,182,212,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 38% at 90% 110%, rgba(245,158,11,0.09) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 55% 105%, rgba(6,182,212,0.06) 0%, transparent 50%);
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%, 100% 100%;
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(3, 7, 18, 0.92);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid rgba(6,182,212,0.1);
      box-shadow: 0 0 0 0 transparent, 0 4px 32px rgba(0,0,0,0.6);
    }
    /* Faint cyan glow line under header */
    header::after {
      content: '';
      position: absolute; bottom: -1px; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(6,182,212,0.35) 40%, rgba(6,182,212,0.35) 60%, transparent);
      pointer-events: none;
    }

    /* ── Cards ── */
    .card {
      background: linear-gradient(160deg, rgba(6,182,212,0.025) 0%, var(--bg-card) 30%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--border-active);
      box-shadow: 0 0 40px rgba(6,182,212,0.09), 0 12px 48px rgba(0,0,0,0.65);
    }
    /* Corner bracket top-left */
    .card::before {
      content: '';
      position: absolute; top: -1px; left: -1px;
      width: 20px; height: 20px;
      border-top: 2px solid rgba(6,182,212,0.55);
      border-left: 2px solid rgba(6,182,212,0.55);
      border-radius: 8px 0 0 0;
      pointer-events: none;
    }
    /* Corner bracket bottom-right */
    .card::after {
      content: '';
      position: absolute; bottom: -1px; right: -1px;
      width: 20px; height: 20px;
      border-bottom: 2px solid rgba(6,182,212,0.32);
      border-right: 2px solid rgba(6,182,212,0.32);
      border-radius: 0 0 8px 0;
      pointer-events: none;
    }

    /* ── Stat cards ── */
    .stat-card { overflow: hidden; }
    /* Stat card overrides ::after for inner glow instead of bracket */
    .stat-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 12px;
      background: radial-gradient(ellipse at 10% 10%, rgba(255,255,255,0.025) 0%, transparent 55%);
      pointer-events: none;
    }
    .stat-value {
      font-size: 2.4rem; font-weight: 900;
      line-height: 1; letter-spacing: -0.04em;
    }
    .stat-label {
      font-size: 0.62rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.13em;
      font-weight: 700; margin-top: 0.5rem;
    }

    /* ── Chart section titles ── */
    .chart-title {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.17em;
      color: #4a7a9b;
      padding-left: 10px; position: relative;
    }
    .chart-title::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 2px; height: 11px;
      background: linear-gradient(180deg, #22d3ee 0%, #0891b2 100%);
      border-radius: 1px;
    }

    /* ── Tags ── */
    .tag {
      display: inline-block; padding: 2px 9px;
      border-radius: 4px; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.05em;
    }
    .tag-green  { background: rgba(0,229,160,0.07);  color: #00e5a0; border: 1px solid rgba(0,229,160,0.22); }
    .tag-yellow { background: rgba(245,158,11,0.07); color: #f59e0b; border: 1px solid rgba(245,158,11,0.22); }
    .tag-red    { background: rgba(244,63,94,0.07);  color: #f43f5e; border: 1px solid rgba(244,63,94,0.22); }

    /* ── Nav ── */
    nav a {
      color: #2d4460; font-weight: 500; font-size: 0.875rem;
      transition: color 0.15s; position: relative; padding-bottom: 3px;
      text-decoration: none;
    }
    nav a:hover { color: #7a99bb; }
    nav a.active { color: #e2e8f0; }
    nav a.active::after {
      content: '';
      position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; border-radius: 1px;
      background: linear-gradient(90deg, var(--cyan), var(--cyan-hi));
      box-shadow: 0 0 10px rgba(6,182,212,0.7);
    }

    /* ── Sync button ── */
    .btn-primary {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 0.38rem 1.15rem; border-radius: 4px; border: none;
      cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
      transition: box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 0 20px rgba(6,182,212,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-primary:hover { box-shadow: 0 0 32px rgba(6,182,212,0.7), inset 0 1px 0 rgba(255,255,255,0.12); }
    .btn-primary:disabled { opacity: 0.3; box-shadow: none; cursor: default; }

    /* ── Toggle buttons ── */
    .toggle-btn { border-radius: 4px; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.03em; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.25); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(6,182,212,0.5); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.10s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.20s; }
  </style>
</head>
<body>
  <header class="px-6 py-3.5 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
          <defs>
            <linearGradient id="lbg" x1="0" y1="0" x2="42" y2="42" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#020c18"/>
              <stop offset="100%" stop-color="#061828"/>
            </linearGradient>
            <linearGradient id="lbar" x1="6" y1="0" x2="36" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#0891b2" stop-opacity="0.5"/>
              <stop offset="30%" stop-color="#22d3ee"/>
              <stop offset="70%" stop-color="#22d3ee"/>
              <stop offset="100%" stop-color="#0891b2" stop-opacity="0.5"/>
            </linearGradient>
            <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="1.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="42" height="42" rx="10" fill="url(#lbg)"/>
          <rect width="42" height="42" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.2" stroke-opacity="0.5"/>
          <rect x="3.5" y="3.5" width="35" height="35" rx="7.5" fill="none" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.18"/>
          <rect x="6" y="8" width="30" height="5.5" rx="2" fill="url(#lbar)" filter="url(#glow)"/>
          <rect x="18" y="13.5" width="6" height="16" rx="1.5" fill="#22d3ee" fill-opacity="0.95" filter="url(#softglow)"/>
          <circle cx="21" cy="14" r="3" fill="#67e8f9" filter="url(#glow)"/>
          <polyline points="5,35 8,35 10.5,29 13.5,35 16,35 18,31 20,35 23,35" stroke="#00e5a0" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          <line x1="23" y1="35" x2="37" y2="35" stroke="#00e5a0" stroke-width="1.4" stroke-linecap="round" opacity="0.22"/>
        </svg>
        <div style="line-height:1">
          <div style="font-size:1.1rem;font-weight:900;letter-spacing:0.15em;background:linear-gradient(110deg,#ffffff 0%,#67e8f9 50%,#22d3ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">TANAR</div>
          <div style="font-size:0.58rem;color:#2d7a96;letter-spacing:0.3em;font-weight:700;margin-top:3px">HEALTH</div>
        </div>
      </a>
      <nav class="flex gap-6">
        <a href="/" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/report" class="{% block nav_report %}{% endblock %}">Monthly Report</a>
      </nav>
    </div>
    <div class="flex items-center gap-5">
      <button id="syncBtn" onclick="triggerSync()" class="btn-primary">Sync Now</button>
      <a href="/auth/whoop" style="font-size:0.72rem;font-weight:500;color:#1e3a50;transition:color 0.15s;text-decoration:none" onmouseover="this.style.color='#64748b'" onmouseout="this.style.color='#1e3a50'">Connect Whoop</a>
      <a href="/auth/strava" style="font-size:0.72rem;font-weight:500;color:#1e3a50;transition:color 0.15s;text-decoration:none" onmouseover="this.style.color='#64748b'" onmouseout="this.style.color='#1e3a50'">Connect Strava</a>
    </div>
  </header>

  <main class="px-6 py-8 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  <script>
    async function triggerSync() {
      const btn = document.getElementById('syncBtn');
      btn.textContent = 'Syncing…';
      btn.disabled = true;
      await fetch('/sync/all', { method: 'POST' });
      setTimeout(() => { btn.textContent = 'Sync Now'; btn.disabled = false; location.reload(); }, 8000);
    }

    const SPORT_ALIASES = {
      'workout':              'Jiu Jitsu',
      'running':              'Run',
      'trail_running':        'Run',
      'strength_training':    'Weight Training',
      'cycling':              'Ride',
      'indoor_cycling':       'Ride',
      'mountain_biking':      'Ride',
      'swimming':             'Swim',
      'open_water_swimming':  'Swim',
      'hiking':               'Hike',
      'walking':              'Walk',
      'yoga':                 'Yoga',
      'elliptical':           'Elliptical',
      'rowing':               'Rowing',
      'cross_country_skiing': 'Nordic Ski',
    };
    function displaySport(s) {
      if (!s) return 'other';
      const aliased = SPORT_ALIASES[s.toLowerCase()];
      if (aliased) return aliased;
      if (s.includes('_')) return s.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      return s.replace(/([a-z])([A-Z])/g, '$1 $2');
    }

    const SPORT_COLORS = {
      'Run':             '#f43f5e',
      'Ride':            '#22d3ee',
      'Virtual Ride':    '#38bdf8',
      'Swim':            '#0ea5e9',
      'Hike':            '#00e5a0',
      'Walk':            '#34d399',
      'Jiu Jitsu':       '#a78bfa',
      'Weight Training': '#f59e0b',
      'Yoga':            '#f472b6',
      'Nordic Ski':      '#e2e8f0',
      'Rowing':          '#fbbf24',
      'Elliptical':      '#c084fc',
      'other':           '#334155',
    };
    const FALLBACK_COLORS = ['#f43f5e','#22d3ee','#a78bfa','#f59e0b','#00e5a0','#f472b6','#38bdf8'];
    function sportColor(name, idx) { return SPORT_COLORS[name] || FALLBACK_COLORS[idx % FALLBACK_COLORS.length]; }

    const PLOTLY_LAYOUT = {
      paper_bgcolor: 'transparent',
      plot_bgcolor:  'transparent',
      font: { color: '#3d5570', size: 11, family: 'Inter, system-ui, sans-serif' },
      xaxis: { gridcolor: 'rgba(6,182,212,0.055)', linecolor: 'rgba(6,182,212,0.1)', tickcolor: 'transparent' },
      yaxis: { gridcolor: 'rgba(6,182,212,0.055)', linecolor: 'rgba(6,182,212,0.1)', tickcolor: 'transparent' },
      margin: { t: 30, r: 10, b: 40, l: 48 },
      legend: { bgcolor: 'transparent', font: { color: '#64748b', size: 11 } },
      hoverlabel: { bgcolor: '#030712', bordercolor: 'rgba(6,182,212,0.45)', font: { color: '#e2e8f0', size: 12 } },
    };
    const PLOTLY_CONFIG = { responsive: true, displayModeBar: false };
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
