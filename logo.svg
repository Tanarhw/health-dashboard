<svg width="420" height="88" viewBox="0 0 420 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="420" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020c18"/>
      <stop offset="100%" stop-color="#061828"/>
    </linearGradient>
    <linearGradient id="bloom" x1="0" y1="0" x2="160" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="18" y1="0" x2="66" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="65%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="98" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="16" x2="0" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="40%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="88" rx="12" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="420" height="88" rx="12" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.38"/>
  <!-- Top-left bloom -->
  <rect width="200" height="88" rx="12" fill="url(#bloom)"/>
  <!-- Inner inset border -->
  <rect x="4" y="4" width="412" height="80" rx="9" fill="none" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- ── Corner brackets (top-left) ── -->
  <path d="M12 28 L12 12 L28 12" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-opacity="0.65" stroke-linecap="square"/>
  <!-- Corner brackets (bottom-right of icon zone) -->
  <path d="M68 60 L68 76 L52 76" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-opacity="0.35" stroke-linecap="square"/>

  <!-- ── Icon ── -->
  <!-- Icon background tile -->
  <rect x="12" y="12" width="56" height="64" rx="9" fill="#020c18" fill-opacity="0.8"/>
  <rect x="12" y="12" width="56" height="64" rx="9" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <!-- T crossbar -->
  <rect x="18" y="22" width="44" height="7" rx="2.5" fill="url(#bar)"/>
  <!-- T stem -->
  <rect x="33" y="29" width="8" height="22" rx="2" fill="url(#stem)" fill-opacity="0.95"/>
  <!-- Junction accent dot -->
  <circle cx="37" cy="30" r="4" fill="#67e8f9" fill-opacity="0.85"/>
  <circle cx="37" cy="30" r="2" fill="#ffffff" fill-opacity="0.6"/>
  <!-- EKG pulse line -->
  <polyline points="14,61 18,61 21,53 25,61 28,61 31,56 34,61 38,61" stroke="#00e5a0" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
  <line x1="38" y1="61" x2="66" y2="61" stroke="#00e5a0" stroke-width="1.6" stroke-linecap="round" opacity="0.18"/>

  <!-- ── Divider ── -->
  <line x1="84" y1="16" x2="84" y2="72" stroke="url(#divider)" stroke-width="1"/>

  <!-- ── Wordmark ── -->
  <text x="98" y="52" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="url(#wordmark)">TANAR</text>
  <text x="100" y="67" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="7" fill="#2d7a96">HEALTH DASHBOARD</text>

  <!-- ── Right decoration: abstract metric bars ── -->
  <rect x="310" y="30" width="3" height="28" rx="1.5" fill="#22d3ee" fill-opacity="0.5"/>
  <rect x="318" y="22" width="3" height="36" rx="1.5" fill="#22d3ee" fill-opacity="0.7"/>
  <rect x="326" y="36" width="3" height="20" rx="1.5" fill="#22d3ee" fill-opacity="0.35"/>
  <rect x="334" y="26" width="3" height="30" rx="1.5" fill="#00e5a0" fill-opacity="0.55"/>
  <rect x="342" y="38" width="3" height="18" rx="1.5" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="350" y="20" width="3" height="36" rx="1.5" fill="#22d3ee" fill-opacity="0.4"/>
  <rect x="358" y="32" width="3" height="24" rx="1.5" fill="#00e5a0" fill-opacity="0.65"/>
  <rect x="366" y="28" width="3" height="28" rx="1.5" fill="#22d3ee" fill-opacity="0.3"/>
  <rect x="374" y="34" width="3" height="22" rx="1.5" fill="#f43f5e" fill-opacity="0.45"/>
  <rect x="382" y="24" width="3" height="32" rx="1.5" fill="#22d3ee" fill-opacity="0.55"/>
  <rect x="390" y="38" width="3" height="18" rx="1.5" fill="#00e5a0" fill-opacity="0.4"/>
  <rect x="398" y="30" width="3" height="26" rx="1.5" fill="#22d3ee" fill-opacity="0.28"/>
  <!-- Baseline line under bars -->
  <line x1="308" y1="58" x2="404" y2="58" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.25"/>
</svg>
